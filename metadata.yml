Status: In progress
Title: lazychemvis-ref-library
Description: This model uses lazy-chemvis tool to performs PCA, UMAP, t-SNE and 
  TMAP projections taking the Ersilia Reference Library with 1.3M compounds as a
  chemical space of reference. ECFP4 fingerprints (2048 bits) and RDKit 
  physicochemical descriptors are used as molecular descriptors. Two coordinates
  are returned for each projection method.
